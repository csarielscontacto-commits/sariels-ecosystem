<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reclama STOK - Sariel's</title>
  <style>
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --ok: #22c55e;
      --error: #ef4444;
      --muted: #64748b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #0f172a;
      min-height: 100vh;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 18px;
    }

    .brand {
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .title {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .pill {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.86rem;
      font-weight: 600;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92rem;
      word-break: break-all;
      background: #f8fafc;
      border-radius: 10px;
      padding: 10px;
      width: 100%;
      white-space: pre-line;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }

    button.secondary { background: #475569; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.92rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .status.ok { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .status.error { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }

    .cookies {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .cookie {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
      padding: 8px 2px;
      background: #f8fafc;
      font-size: 1.1rem;
      opacity: 0.4;
    }

    .cookie.on {
      opacity: 1;
      border-color: #f59e0b;
      background: #fffbeb;
    }

    .hidden { display: none !important; }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .confetti span {
      position: absolute;
      top: -10px;
      width: 8px;
      height: 14px;
      opacity: 0.9;
      animation: fall 1.3s linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    @media (max-width: 520px) {
      .cookies { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">🍪 Sariel's</div>
    <section class="card">
      <h1 class="title">Reclamo por Producto</h1>
      <p class="sub">Escanea tu QR, conecta wallet Amoy y reclama 1 STOK por domo.</p>

      <div class="pill">Código QR: <span id="codeLabel">—</span></div>
      <div class="status" id="statusBox">Inicializando...</div>

      <div class="row">
        <button id="connectBtn">Conectar wallet</button>
        <button class="secondary hidden" id="switchBtn">Cambiar a Polygon Amoy</button>
        <button id="claimBtn" class="hidden">Reclamar TOK</button>
        <button id="nftBtn" class="hidden">¡Reclamar NFT!</button>
      </div>

      <div class="row" style="margin-top:14px;">
        <div class="pill">Wallet: <span id="walletLabel">No conectada</span></div>
        <div class="pill">Saldo STOK: <span id="balanceLabel">0</span></div>
      </div>

      <div class="cookies" id="cookieBoard"></div>

      <div class="row" style="margin-top:14px;">
        <div class="mono" id="metaBox">Esperando conexión...</div>
      </div>
    </section>
  </div>

  <div class="confetti hidden" id="confetti"></div>

  <!-- Orden correcto -->
  <script src="config.js"></script>
  <script src="base-datos-centralizada.js"></script>
  <script src="data/abis.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
  <script src="scripts/claim.js"></script>
</body>
</html>
