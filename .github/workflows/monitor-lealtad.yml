name: Monitor de Lealtad Sariel
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Ejecutar consulta
        run: |
          curl https://rpc-amoy.polygon.technology \
          -X POST -H "Content-Type: application/json" \
          -d '{"jsonrpc":"2.0","method":"eth_getTransactionCount","params":["0x8F742964244AE588dF7C5B2b27Ded374fDdAd69b","latest"],"id":1}' \
          -o transacciones.json --silent --fail || echo '{"error":"RPC no disponible"}' > transacciones.json
      - name: Guardar resultados
        run: |
          git config user.name "Sariel-Bot"
          git config user.email "bot@sariel.com"
          git add transacciones.json
          git diff --staged --quiet || git commit -m "Actualizacion automatica de transacciones"
          git push

