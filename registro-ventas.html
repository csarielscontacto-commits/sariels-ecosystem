<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ventas - Sariel's</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="base-datos-centralizada.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 1.8em;
        }
        
        .dashboard-link {
            background: #26a69a;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        
        .dashboard-link:hover {
            background: #1e7f76;
        }
        
        .vendedor-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
        }
        
        .vendedor-info p {
            margin: 5px 0;
            color: #333;
        }
        
        .vendedor-badge {
            display: inline-block;
            background: #2196f3;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .info-box {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .precio-display {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .success-message {
            display: none;
            background: #26a69a;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Registrar Venta</h1>
            <a href="dashboard-ventas.html" class="dashboard-link">📊 Dashboard</a>
        </div>
        
        <div class="vendedor-info">
            <p><strong>Vendedor:</strong> <span class="vendedor-badge" id="vendedorBadge">Cargando...</span></p>
            <p id="contadorVendedor">Ventas: 0</p>
        </div>
        
        <div class="info-box">
            <strong>⚠️ Instrucciones:</strong>
            <p>1. Escanea el QR del cliente</p>
            <p>2. Completa el formulario</p>
            <p>3. Presiona "Registrar Venta"</p>
        </div>
        
        <div class="success-message" id="successMessage">
            ✅ ¡Venta registrada exitosamente!
        </div>
        
        <form id="ventasForm">
            <div class="form-group">
                <label for="cantidad">Cantidad de productos:</label>
                <input type="number" id="cantidad" min="1" value="1" required>
            </div>
            
            <div class="precio-display" id="precioTotal">
                Total: $75.00 MXN
            </div>
            
            <div class="form-group">
                <label for="cliente">Nombre del cliente:</label>
                <input type="text" id="cliente" placeholder="Opcional" required>
            </div>
            
            <div class="form-group">
                <label for="metodo">Método de pago:</label>
                <select id="metodo" required>
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                    <option value="tarjeta">Tarjeta de crédito/débito</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            
            <button type="submit">📊 Registrar Venta</button>
        </form>
    </div>

    <script>
        const PRECIO_UNITARIO = (window.CONFIG && window.CONFIG.PRECIO_UNITARIO) || 75;
        let vendedorActual = null;
        
        // Inicializar vendedor
        function inicializarVendedor() {
            vendedorActual = obtenerOCrearVendedor();
            document.getElementById('vendedorBadge').textContent = vendedorActual.nombre;
            actualizarContadorVendedor();
        }
        
        function obtenerOCrearVendedor() {
            let vendedorId = localStorage.getItem('vendedorActual');
            
            if (!vendedorId) {
                // Crear nuevo vendedor
                const vendedores = JSON.parse(localStorage.getItem('vendedores')) || [];
                let numeroVendedor = vendedores.length + 1;
                
                vendedorId = 'vendedor_' + numeroVendedor;
                const vendedor = {
                    id: vendedorId,
                    nombre: 'Vendedor ' + numeroVendedor,
                    numero: numeroVendedor,
                    fechaRegistro: new Date().toISOString()
                };
                
                vendedores.push(vendedor);
                localStorage.setItem('vendedores', JSON.stringify(vendedores));
                localStorage.setItem('vendedorActual', vendedorId);
            }
            
            const vendedores = JSON.parse(localStorage.getItem('vendedores')) || [];
            return vendedores.find(v => v.id === vendedorId);
        }
        
        function actualizarContadorVendedor() {
            const ventas = JSON.parse(localStorage.getItem('ventas')) || [];
            const ventasVendedor = ventas.filter(v => v.vendedorId === vendedorActual.id).length;
            document.getElementById('contadorVendedor').textContent = `Ventas: ${ventasVendedor}`;
        }
        
        // Actualizar precio total según cantidad
        document.getElementById('cantidad').addEventListener('change', function() {
            const cantidad = parseInt(this.value) || 1;
            const total = cantidad * PRECIO_UNITARIO;
            document.getElementById('precioTotal').textContent = 
                `Total: $${total.toLocaleString()} MXN`;
        });
        
        document.getElementById('ventasForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const cliente = document.getElementById('cliente').value;
            const metodo = document.getElementById('metodo').value;
            const total = cantidad * PRECIO_UNITARIO;
            
            const venta = {
                vendedorId: vendedorActual.id,
                vendedorNombre: vendedorActual.nombre,
                cantidad: cantidad,
                cliente: cliente || 'Anónimo',
                metodo: metodo,
                monto: total,
                fechaRegistro: new Date().toISOString()
            };
            
            // Guardar a través del sistema centralizado (sincroniza con Supabase).
            // Esto también guarda en localStorage internamente y dispara los
            // eventos 'ventaRegistrada' / 'sincronizacionCompleta' que ya
            // escuchan el dashboard y otras pestañas.
            if (typeof window.registrarVentaCentralizada === 'function') {
                window.registrarVentaCentralizada(venta);
            } else {
                // Respaldo si algo falla al cargar el sistema centralizado
                let ventas = JSON.parse(localStorage.getItem('ventas')) || [];
                ventas.push(venta);
                localStorage.setItem('ventas', JSON.stringify(ventas));
                window.dispatchEvent(new CustomEvent('ventaNueva', { detail: venta }));
            }
            
            // Mostrar mensaje de éxito
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            
            // Actualizar contador
            actualizarContadorVendedor();
            
            // Limpiar formulario
            this.reset();
            document.getElementById('precioTotal').textContent = `Total: $${PRECIO_UNITARIO.toLocaleString()} MXN`;
            
            // Ocultar mensaje después de 3 segundos
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
            
            console.log('Venta registrada:', venta);
        });
        
        // Escuchar cambios en localStorage desde otros tabs
        window.addEventListener('storage', function(e) {
            if (e.key === 'ventas') {
                actualizarContadorVendedor();
            }
        });
        
        // Inicializar al cargar
        document.addEventListener('DOMContentLoaded', inicializarVendedor);
    </script>
</body>
</html>
