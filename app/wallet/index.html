<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sariel Wallet Overlay</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(40, 247, 154, 0.18), transparent 28%),
                #040a08;
            color: #e9fff4;
            font-family: Inter, 'Segoe UI', Tahoma, sans-serif;
        }
        .shell {
            width: min(92vw, 720px);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid rgba(40, 247, 154, 0.16);
            background: linear-gradient(180deg, rgba(8, 16, 13, 0.96), rgba(13, 24, 19, 0.96));
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 12px;
        }
        p {
            color: #9ccab5;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0;
        }
        button {
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #28f79a, #18c77a);
            color: #042415;
        }
        button.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #dfffee;
        }
        .code {
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(40, 247, 154, 0.14);
            background: rgba(8, 14, 11, 0.9);
            color: #b7e7cb;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            overflow: auto;
        }
    </style>
</head>
<body>
    <main class="shell">
        <h1>👛 Sariel Wallet Overlay</h1>
        <p>Base reusable de wallet lista para inyectarse como ventana flotante y ser llamada desde cualquier parte del ecosistema mediante estados de ventana.</p>
        <div class="actions">
            <button id="openWallet" type="button">Abrir wallet</button>
            <button id="openAdmin" type="button" class="secondary">Abrir vista admin</button>
        </div>
        <p>API pública:</p>
        <div class="code">window.SarielWalletApp.mount().open('connect')</div>
    </main>

    <script src="../../config.js"></script>
    <script src="../../assets/vendor/ethers.umd.min.js"></script>
    <script src="../../assets/vendor/web3modal.min.js"></script>
    <script src="../../assets/vendor/walletconnect-web3-provider.min.js"></script>
    <script src="../../integrations/polygon/index.js"></script>
    <script src="./index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const app = window.SarielWalletApp.mount();

            document.getElementById('openWallet').addEventListener('click', function () {
                app.open('connect');
            });

            document.getElementById('openAdmin').addEventListener('click', function () {
                app.open('admin');
            });
        });
    </script>
</body>
</html>
