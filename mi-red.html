<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Red Ultra | Sariel's Nexus</title>
    <meta name="theme-color" content="#05080f" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Sariel's Nexus - Mi Red Ultra" />
    <meta property="og:description" content="Red social descentralizada con chat, videollamadas, grupos, pagos, IA y más" />
    <meta property="og:type" content="website" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
    
    <style>
        /* ===== VARIABLES CÓSMICAS ===== */
        :root {
            --space-deep: #05080f;
            --space-mid: #0a1428;
            --space-light: #101f3a;
            --nebula-1: #6c2bd9;
            --nebula-2: #ff6b9d;
            --nebula-3: #00d4ff;
            --gold-cosmic: #f7d44a;
            --gold-dim: rgba(247,212,74,0.15);
            --plasma: #ff3366;
            --quantum: #00e5ff;
            --text-primary: #e8f0f8;
            --text-secondary: #8ba3c7;
            --text-muted: #4a6a8a;
            --border: rgba(0,212,255,0.08);
            --border-glow: rgba(0,212,255,0.25);
            --shadow-neon: 0 0 40px rgba(0,212,255,0.1);
            --shadow-glow: 0 0 60px rgba(108,43,217,0.15);
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #00b894;
            --warning: #f7d44a;
            --danger: #ff3366;
        }

        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--space-deep);
            color: var(--text-primary);
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== FONDO ESTELAR CON CANVAS ===== */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== NEBULOSAS ===== */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: nebula-drift 25s ease-in-out infinite alternate;
        }

        .nebula-1 { width: 700px; height: 700px; background: var(--nebula-1); top: -15%; right: -15%; }
        .nebula-2 { width: 600px; height: 600px; background: var(--nebula-2); bottom: -15%; left: -15%; animation-delay: -8s; }
        .nebula-3 { width: 500px; height: 500px; background: var(--nebula-3); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -15s; opacity: 0.06; }

        @keyframes nebula-drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.15); }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--space-deep); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--nebula-3), var(--nebula-1)); border-radius: 3px; }

        /* ===== LAYOUT ===== */
        .app { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 20px 24px 40px; }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--quantum), var(--nebula-2), var(--quantum), transparent);
            opacity: 0.3;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 0 20px rgba(0,212,255,0.3));
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0,212,255,0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(247,212,74,0.4)); }
        }

        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-primary), var(--quantum), var(--nebula-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0,212,255,0.2);
        }

        .logo-badge {
            font-family: 'Orbitron', monospace;
            font-size: 0.5rem;
            background: linear-gradient(135deg, var(--nebula-1), var(--nebula-2));
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            -webkit-text-fill-color: white;
            box-shadow: 0 0 30px rgba(108,43,217,0.3);
            animation: badge-pulse 2s ease-in-out infinite;
        }

        @keyframes badge-pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(108,43,217,0.3); }
            50% { box-shadow: 0 0 60px rgba(255,107,157,0.4); }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.15);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: var(--quantum);
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: quantum-pulse 1.5s ease-in-out infinite;
        }

        .status-dot.online { background: var(--success); box-shadow: 0 0 20px rgba(0,184,148,0.5); }
        .status-dot.offline { background: var(--text-muted); box-shadow: 0 0 20px rgba(74,106,138,0.3); }

        @keyframes quantum-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* ===== BOTONES ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: rgba(0,212,255,0.03);
            color: var(--text-primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn:hover { transform: scale(1.03); border-color: var(--border-glow); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        .btn-primary {
            background: linear-gradient(135deg, var(--nebula-1), var(--nebula-2));
            border-color: transparent;
            color: white;
            -webkit-text-fill-color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--nebula-2), var(--nebula-1));
            box-shadow: 0 0 40px rgba(108,43,217,0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #00897b);
            border-color: transparent;
            color: white;
            -webkit-text-fill-color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: linear-gradient(135deg, #00897b, #00695c);
            box-shadow: 0 0 40px rgba(0,184,148,0.3);
        }

        .btn-danger {
            background: rgba(255,51,102,0.15);
            border-color: rgba(255,51,102,0.3);
            color: var(--danger);
        }

        .btn-danger:hover:not(:disabled) { background: rgba(255,51,102,0.25); }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold-cosmic), #b8923a);
            border-color: transparent;
            color: #0a0c10;
            -webkit-text-fill-color: #0a0c10;
        }

        .btn-gold:hover:not(:disabled) { box-shadow: 0 0 40px rgba(247,212,74,0.3); }

        .btn-outline {
            border-color: var(--border);
            background: transparent;
        }

        .btn-outline:hover:not(:disabled) {
            background: rgba(0,212,255,0.05);
            border-color: var(--quantum);
        }

        .btn-sm { padding: 6px 14px; font-size: 0.6rem; }
        .btn-block { width: 100%; justify-content: center; }

        /* ===== PERFIL ===== */
        .profile-card {
            background: rgba(10,20,40,0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            flex-wrap: wrap;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--quantum), var(--nebula-1), var(--nebula-2), var(--quantum));
            background-size: 300% 300%;
            border-radius: var(--radius);
            z-index: -1;
            opacity: 0;
            animation: border-flow 4s ease-in-out infinite;
        }

        .profile-card:hover::before { opacity: 0.3; }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-cosmic), var(--nebula-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0a0c10;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar .edit-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--quantum);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #0a0c10;
            border: 2px solid var(--space-deep);
        }

        .profile-info { flex: 1; min-width: 150px; }
        .profile-info .name {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--quantum));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .profile-info .sub { color: var(--text-secondary); font-size: 0.85rem; }

        .profile-stats { display: flex; gap: 24px; flex-wrap: wrap; }
        .profile-stats .stat { text-align: center; }
        .profile-stats .stat .number {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold-cosmic);
        }
        .profile-stats .stat .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== BUSCADOR ===== */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(10,20,40,0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--quantum);
            box-shadow: 0 0 30px rgba(0,212,255,0.05);
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-box .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box .shortcuts {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
        }

        .search-box .shortcuts span {
            font-size: 0.6rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Orbitron', monospace;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab:hover { color: var(--text-secondary); }
        .tab.active { color: var(--quantum); border-bottom-color: var(--quantum); }

        .tab .badge {
            background: var(--danger);
            color: white;
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
        }
        .tab .badge.hidden { display: none; }

        /* ===== PERSONA CARD ===== */
        .persona-card {
            background: rgba(10,20,40,0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .persona-card:hover { transform: translateX(4px); border-color: var(--border-glow); }

        .persona-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--nebula-1), var(--nebula-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }

        .persona-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .persona-avatar.online { border: 2px solid var(--success); }
        .persona-avatar.offline { border: 2px solid var(--text-muted); }

        .persona-info { flex: 1; min-width: 0; cursor: pointer; }
        .persona-info .name { font-weight: 600; font-size: 0.95rem; }
        .persona-info .meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .persona-info .meta .status-text {
            font-size: 0.6rem;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .persona-info .meta .status-text.online { color: var(--success); }
        .persona-info .meta .status-text.offline { color: var(--text-muted); }

        .level-badge {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
        }

        .level-badge.bronze { background: rgba(184,115,51,0.2); color: #d99b5f; border: 1px solid rgba(184,115,51,0.3); }
        .level-badge.silver { background: rgba(192,194,200,0.15); color: #c0c2c8; border: 1px solid rgba(192,194,200,0.2); }
        .level-badge.gold { background: rgba(247,212,74,0.15); color: var(--gold-cosmic); border: 1px solid rgba(247,212,74,0.2); }
        .level-badge.diamond { background: rgba(0,212,255,0.15); color: var(--quantum); border: 1px solid rgba(0,212,255,0.2); }

        .persona-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 12px; }
        .empty-state h3 { font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--text-secondary); }
        .empty-state p { font-size: 0.9rem; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: rgba(10,20,40,0.95);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 440px;
            width: 100%;
            position: relative;
            animation: fadeInUp 0.3s ease-out;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--quantum), var(--nebula-1), var(--nebula-2), var(--quantum));
            background-size: 300% 300%;
            border-radius: var(--radius);
            z-index: -1;
            opacity: 0.2;
            animation: border-flow 4s ease-in-out infinite;
        }

        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, var(--nebula-1), var(--nebula-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            overflow: hidden;
        }
        .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .modal-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 4px;
        }
        .modal-sub {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .modal-level { display: block; text-align: center; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-actions .btn { flex: 1; justify-content: center; min-width: 100px; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--success);
            color: #0a0c10;
            padding: 14px 28px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            pointer-events: none;
            font-family: 'Orbitron', monospace;
            box-shadow: var(--shadow-neon);
        }
        .toast.active { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); color: white; }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 48px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--quantum), transparent);
            opacity: 0.2;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            font-family: 'Orbitron', monospace;
        }

        .footer-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            transition: var(--transition);
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.5px;
        }

        .footer-links a:hover { color: var(--quantum); }

        /* ===== ANIMACIONES ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .persona-card {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        .persona-card:nth-child(2) { animation-delay: 0.05s; }
        .persona-card:nth-child(3) { animation-delay: 0.1s; }
        .persona-card:nth-child(4) { animation-delay: 0.15s; }
        .persona-card:nth-child(5) { animation-delay: 0.2s; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .logo-text { font-size: 1.2rem; }
            .header-actions { width: 100%; justify-content: flex-start; }
            .profile-card { flex-direction: column; align-items: center; text-align: center; }
            .profile-stats { justify-content: center; }
            .persona-card { flex-wrap: wrap; }
            .persona-actions { width: 100%; justify-content: flex-end; }
            .tabs { gap: 0; }
            .tab { padding: 10px 14px; font-size: 0.6rem; }

        // ===== ESTRELLAS Y METEORITOS =====
        function initStars() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let stars = [];
            let meteors = [];
            
            const STAR_COUNT = 300;
            const METEOR_COUNT = 3;
            
            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            
            function createStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 1.8 + 0.3,
                        speed: Math.random() * 0.02 + 0.005,
                        opacity: Math.random() * 0.8 + 0.2,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
            }
            
            function createMeteor() {
                return {
                    x: Math.random() * width * 0.8,
                    y: Math.random() * height * 0.3,
                    speed: Math.random() * 3 + 4,
                    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.6 + 0.4,
                    active: true,
                    trail: []
                };
            }
            
            function initMeteors() {
                meteors = [];
                for (let i = 0; i < METEOR_COUNT; i++) {
                    const meteor = createMeteor();
                    meteor.x = Math.random() * width;
                    meteor.y = Math.random() * height * 0.2;
                    meteors.push(meteor);
                }
            }
            
            function updateStars() {
                for (let star of stars) {
                    star.twinklePhase += star.twinkleSpeed;
                    star.y += star.speed;
                    if (star.y > height) {
                        star.y = 0;
                        star.x = Math.random() * width;
                    }
                }
            }
            
            function updateMeteors() {
                for (let meteor of meteors) {
                    if (!meteor.active) continue;
                    meteor.x += Math.cos(meteor.angle) * meteor.speed;
                    meteor.y += Math.sin(meteor.angle) * meteor.speed;
                    meteor.trail.push({ x: meteor.x, y: meteor.y });
                    if (meteor.trail.length > 20) meteor.trail.shift();
                    if (meteor.x > width + 100 || meteor.y > height + 100) {
                        meteor.active = false;
                        setTimeout(() => {
                            const newMeteor = createMeteor();
                            newMeteor.x = Math.random() * width * 0.3;
                            newMeteor.y = Math.random() * height * 0.2;
                            Object.assign(meteor, newMeteor);
                            meteor.active = true;
                        }, Math.random() * 3000 + 2000);
                    }
                }
            }
            
            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                for (let star of stars) {
                    const opacity = star.opacity * (0.6 + 0.4 * Math.sin(star.twinklePhase));
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                    ctx.fill();
                    if (star.radius > 1.2) {
                        ctx.shadowColor = 'rgba(255, 255, 255, 0.05)';
                        ctx.shadowBlur = 10;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
                
                for (let meteor of meteors) {
                    if (!meteor.active) continue;
                    for (let i = 0; i < meteor.trail.length; i++) {
                        const point = meteor.trail[i];
                        const alpha = (i / meteor.trail.length) * meteor.opacity * 0.6;
                        const radius = (i / meteor.trail.length) * 2;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(100, 200, 255, ${alpha})`;
                        ctx.fill();
                    }
                    const gradient = ctx.createRadialGradient(meteor.x, meteor.y, 0, meteor.x, meteor.y, 15);
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                    gradient.addColorStop(0.3, 'rgba(100, 200, 255, 0.6)');
                    gradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
                    ctx.beginPath();
                    ctx.arc(meteor.x, meteor.y, 15, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.shadowColor = 'rgba(100, 200, 255, 0.3)';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(meteor.x, meteor.y, 8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            function animate() {
                updateStars();
                updateMeteors();
                draw();
                requestAnimationFrame(animate);
            }
            
            resize();
            createStars();
            initMeteors();
            animate();
            
            window.addEventListener('resize', () => {
                resize();
                createStars();
            });
        }

                        <div class="meta">
                            <span>${m.mensaje}</span>
                            <span style="color:var(--text-muted);">🕐 ${m.hora}</span>
                        </div>
                    </div>
                    <div class="persona-actions">
                        <button class="btn btn-sm btn-primary" onclick="leerMensaje('${m.id}')"><i class="fas fa-reply"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarMensaje('${m.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderBuscar() {
            const valor = document.getElementById('inputBuscar').value;
            renderDescubrir(valor);
            cambiarTab('descubrir');
        }

        function actualizarContadores() {
            const contactos = Object.keys(relaciones).filter(id => relaciones[id] === 'contacto').length;
            const solicitudes = Object.keys(relaciones).filter(id => relaciones[id] === 'solicitud_recibida').length;
            const gruposCount = grupos.length;
            const noLeidos = mensajes.filter(m => !m.leido).length;

            document.getElementById('statContactos').textContent = contactos;
            document.getElementById('statSolicitudes').textContent = solicitudes;
            document.getElementById('statGrupos').textContent = gruposCount;

            const badgeSolicitudes = document.getElementById('badgeSolicitudes');
            if (solicitudes > 0) {
                badgeSolicitudes.textContent = solicitudes;
                badgeSolicitudes.classList.remove('hidden');
            } else {
                badgeSolicitudes.classList.add('hidden');
            }

            const badgeMensajes = document.getElementById('badgeMensajes');
            badgeMensajes.textContent = noLeidos > 0 ? noLeidos : '0';
        }

        function renderAll() {
            renderContactos();
            renderSolicitudes();
            renderDescubrir('');
            renderGrupos();
            renderMensajes();
            actualizarContadores();
            guardarDatosLocales();
        }

        // ===== TABS =====
        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            
            document.getElementById('tab-contactos').style.display = tab === 'contactos' ? 'block' : 'none';
            document.getElementById('tab-solicitudes').style.display = tab === 'solicitudes' ? 'block' : 'none';
            document.getElementById('tab-descubrir').style.display = tab === 'descubrir' ? 'block' : 'none';
            document.getElementById('tab-grupos').style.display = tab === 'grupos' ? 'block' : 'none';
            document.getElementById('tab-mensajes').style.display = tab === 'mensajes' ? 'block' : 'none';
        }

        // ===== ACCIONES =====
        function enviarSolicitud(id) {
            relaciones[id] = 'solicitud_enviada';
            renderAll();
            mostrarToast('✅ Solicitud enviada correctamente');
        }

        function aceptarSolicitud(id) {
            relaciones[id] = 'contacto';
            renderAll();
            mostrarToast('🎉 Ahora son contactos');
        }

        function rechazarSolicitud(id) {
            delete relaciones[id];
            renderAll();
            mostrarToast('❌ Solicitud rechazada');
        }

        function eliminarContacto(id) {
            if (confirm('¿Seguro que quieres eliminar este contacto?')) {
                delete relaciones[id];
                renderAll();
                mostrarToast('🗑️ Contacto eliminado');
            }
        }

        function toggleFavorito(id) {
            const index = contactoFavoritos.indexOf(id);
            if (index > -1) {
                contactoFavoritos.splice(index, 1);
                mostrarToast('⭐ Quitado de favoritos');
            } else {
                contactoFavoritos.push(id);
                mostrarToast('⭐ Agregado a favoritos');
            }
            renderAll();
        }

        function irAChat(id) {
            const p = todosLosClientes.find(c => c.id === id);
            mostrarToast(`💬 Abriendo chat con ${p.nombre}... (WebSocket en desarrollo)`);
        }

        function iniciarVideollamada(id) {
            const p = todosLosClientes.find(c => c.id === id);
            mostrarToast(`📹 Iniciando videollamada con ${p.nombre}... (WebRTC en desarrollo)`);
        }

        function abrirPerfil(id) {
            const p = todosLosClientes.find(c => c.id === id);
            if (!p) return;

            document.getElementById('modalAvatar').innerHTML = avatarHTML(p);
            document.getElementById('modalNombre').textContent = p.nombre;
            document.getElementById('modalTelefono').textContent = `📱 ${p.telefono}`;
            document.getElementById('modalNivel').textContent = `${emojiNivel(p.nivel)} ${nivelTexto(p.nivel)}`;
            document.getElementById('modalNivel').className = `level-badge ${p.nivel}`;

            const acciones = document.getElementById('modalAcciones');
            const estado = relaciones[id];

            if (estado === 'contacto') {
                acciones.innerHTML = `
                    <button class="btn btn-success" onclick="cerrarModal(); irAChat('${id}')"><i class="fas fa-comment"></i> Mensaje</button>
                    <button class="btn btn-primary" onclick="cerrarModal(); iniciarVideollamada('${id}')"><i class="fas fa-video"></i> Llamada</button>
                    <button class="btn btn-outline" onclick="cerrarModal()">Cerrar</button>
                `;
            } else if (estado === 'solicitud_enviada') {
                acciones.innerHTML = `
                    <button class="btn" disabled style="color:var(--text-muted);">⏳ Enviada</button>
                    <button class="btn btn-outline" onclick="cerrarModal()">Cerrar</button>
                `;
            } else if (estado === 'solicitud_recibida') {
                acciones.innerHTML = `
                    <button class="btn btn-success" onclick="aceptarSolicitud('${id}'); cerrarModal();"><i class="fas fa-check"></i> Aceptar</button>
                    <button class="btn btn-danger" onclick="rechazarSolicitud('${id}'); cerrarModal();"><i class="fas fa-times"></i></button>
                `;
            } else {
                acciones.innerHTML = `
                    <button class="btn btn-primary" onclick="enviarSolicitud('${id}'); cerrarModal();"><i class="fas fa-user-plus"></i> Agregar</button>
                    <button class="btn btn-outline" onclick="cerrarModal()">Cerrar</button>
                `;
            }

            document.getElementById('modalPerfil').classList.add('active');
        }

        function cerrarModal() {
            document.getElementById('modalPerfil').classList.remove('active');
        }

        function abrirGrupo(id) {
            const g = grupos.find(g => g.id === id);
            mostrarToast(`📂 Abriendo grupo: ${g.nombre}`);
        }

        function leerMensaje(id) {
            const m = mensajes.find(m => m.id === id);
            if (m) {
                m.leido = true;
                renderAll();
                mostrarToast(`💬 Leyendo mensaje de ${m.de}: ${m.mensaje}`);
            }
        }

        function eliminarMensaje(id) {
            if (confirm('¿Eliminar este mensaje?')) {
                mensajes = mensajes.filter(m => m.id !== id);
                renderAll();
                mostrarToast('🗑️ Mensaje eliminado');
            }
        }

        function cambiarFotoPerfil(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                miPerfil.fotoPerfil = e.target.result;
                document.getElementById('avatarText').innerHTML = `<img src="${e.target.result}" alt="Tú">`;
                document.getElementById('avatarText').style.padding = '0';
                guardarDatosLocales();
                mostrarToast('✅ Foto de perfil actualizada');
            };
            reader.readAsDataURL(file);
        }

        // ===== TOAST =====
        function mostrarToast(mensaje, tipo = '') {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.className = `toast${tipo ? ' ' + tipo : ''}`;
            toast.classList.add('active');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('active'), 3000);
        }

        // ===== INICIALIZAR =====
        renderAll();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModal();
        });

        document.getElementById('modalPerfil').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });
    </script>
</body>
</html>
