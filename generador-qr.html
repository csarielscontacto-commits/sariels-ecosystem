<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin QR - Sariel's</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --ok: #22c55e;
            --muted: #64748b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            color: #0f172a;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 14px;
        }

        h1 { margin: 0 0 8px; }
        .muted { color: var(--muted); margin: 0; }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }

        input, button {
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        button {
            background: var(--primary);
            border: 0;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary { background: #475569; }

        .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge.disponible { background: #dcfce7; color: #166534; }
        .badge.reclamado { background: #fee2e2; color: #991b1b; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .qr-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            background: #fff;
            page-break-inside: avoid;
        }

        .qr {
            display: flex;
            justify-content: center;
            margin: 8px 0;
            min-height: 130px;
            align-items: center;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.78rem;
            word-break: break-all;
            background: #f8fafc;
            border-radius: 8px;
            padding: 8px;
        }

        .hidden { display: none !important; }

        @media print {
            body { background: #fff; }
            #authCard, #controls { display: none !important; }
            .card { box-shadow: none; padding: 0; }
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="card" id="authCard">
            <h1>🔐 Panel Admin de QRs - Sariel's</h1>
            <p class="muted">Ingresa la contraseña para administrar e imprimir etiquetas.</p>
            <div class="row">
                <input type="password" id="passwordInput" placeholder="Contraseña admin">
                <button id="loginBtn">Entrar</button>
            </div>
            <p class="muted" id="authMsg"></p>
        </section>

        <section class="card hidden" id="panelCard">
            <h1>🍪 Códigos QR de Reclamo</h1>
            <p class="muted">Cada etiqueta apunta a <strong>claim.html?code=SarielTO#XXX</strong>.</p>

            <div id="controls" class="row">
                <input type="number" id="limitInput" min="1" value="50" style="max-width:120px;">
                <button id="reloadBtn">Actualizar estado</button>
                <button class="secondary" id="printBtn">Imprimir etiquetas</button>
            </div>

            <div class="row">
                <span class="badge disponible">Disponibles: <span id="availableCount">0</span></span>
                <span class="badge reclamado">Reclamados: <span id="claimedCount">0</span></span>
            </div>
        </section>

        <section class="card hidden" id="gridCard">
            <div class="grid" id="qrGrid"></div>
        </section>
    </div>

    <script src="config.js"></script>
    <script>
        const ADMIN_PASSWORD = 'sariels-admin-2026';
        const CODES_URL = './data/codigos-qr.json';

        const state = {
            codes: []
        };

        const $ = (id) => document.getElementById(id);

        function setAuthMessage(message, isError = false) {
            const el = $('authMsg');
            el.textContent = message;
            el.style.color = isError ? '#b91c1c' : '#64748b';
        }

        async function loadCodes() {
            const response = await fetch(CODES_URL, { cache: 'no-store' });
            if (!response.ok) throw new Error('No se pudo cargar data/codigos-qr.json');
            state.codes = await response.json();
            return state.codes;
        }

        function updateStats(codes) {
            const available = codes.filter((item) => item.estado === 'disponible').length;
            const claimed = codes.length - available;
            $('availableCount').textContent = String(available);
            $('claimedCount').textContent = String(claimed);
        }

        function renderQRCards(codes) {
            const grid = $('qrGrid');
            grid.innerHTML = '';

            const max = Math.max(1, Number($('limitInput').value || 50));
            const selected = codes.slice(0, max);

            selected.forEach((item) => {
                const card = document.createElement('article');
                card.className = 'qr-card';

                const statusClass = item.estado === 'disponible' ? 'disponible' : 'reclamado';
                card.innerHTML = `
                    <strong>${item.codigo}</strong>
                    <div class="row" style="margin-top:6px; margin-bottom:4px;">
                        <span class="badge ${statusClass}">${item.estado}</span>
                    </div>
                    <div class="qr" id="qr-${item.id}"></div>
                    <div class="mono">${item.url_claim}</div>
                `;

                grid.appendChild(card);

                new QRCode(document.getElementById(`qr-${item.id}`), {
                    text: item.url_claim,
                    width: 120,
                    height: 120,
                    correctLevel: QRCode.CorrectLevel.H
                });
            });
        }

        async function reloadData() {
            const codes = await loadCodes();
            updateStats(codes);
            renderQRCards(codes);
        }

        function unlockPanel() {
            $('authCard').classList.add('hidden');
            $('panelCard').classList.remove('hidden');
            $('gridCard').classList.remove('hidden');
            reloadData().catch((error) => alert(error.message));
        }

        $('loginBtn').addEventListener('click', () => {
            const pass = $('passwordInput').value;
            if (pass !== ADMIN_PASSWORD) {
                setAuthMessage('Contraseña incorrecta.', true);
                return;
            }
            unlockPanel();
        });

        $('reloadBtn').addEventListener('click', () => {
            reloadData().catch((error) => alert(error.message));
        });

        $('limitInput').addEventListener('change', () => {
            renderQRCards(state.codes);
        });

        $('printBtn').addEventListener('click', () => {
            window.print();
        });
    </script>
</body>
</html>
