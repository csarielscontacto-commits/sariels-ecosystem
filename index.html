<div id="contenedor-vela" style="height: 200px; display: flex; align-items: flex-end;">
  <div id="barra-ventas" style="width: 40px; background-color: #26a69a; transition: height 0.5s;"></div>
</div>

<script>
  fetch('TU_URL_AQUÍ')
    .then(response => response.json())
    .then(data => {
      document.getElementById('barra-ventas').style.height = data.ventas + 'px';
    })
    .catch(error => console.error('Error al cargar datos:', error));
</script>
