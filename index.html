### Código ajustado para mostrar estrellas y meteorito

He añadido:

- **Función `animate()` bien llamada** con `requestAnimationFrame`.
- **Redimensionamiento correcto del canvas**.
- **Dibujo correcto de estrellas** con `canvas`.
- **Lógica simple para las estrellas** para que no desaparezcan.

Aquí tienes el código final, solo reemplaza la parte del script y el `canvas` en tu código:

```html
<canvas id="stars-canvas"></canvas>

<script>
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');

let stars = [];
const starCount = 200;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createStars() {
  stars = [];
  for (let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.5 + 0.2,
    });
  }
}
createStars();

function animate() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // suave borrado para el efecto de movimiento
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const star of stars) {
    star.x -= star.speed; // las estrellas se mueven
    if (star.x < 0) {
      star.x = canvas.width;
      star.y = Math.random() * canvas.height;
      star.size = Math.random() * 1.5 + 0.5;
    }
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();
  </script>
