<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sariel's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- ===== PRIMERO: Configuración ===== -->
    <script src="config.js"></script>
    <!-- ===== SEGUNDO: Base de datos centralizada ===== -->
    <script src="base-datos-centralizada.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); font-family: 'Segoe UI', sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .neon-text { text-shadow: 0 0 10px rgb(34 211 238); }
        .modal-overlay { background: rgba(0,0,0,0.6); }
        .animate-pulse-slow { animation: pulseSlow 2s ease-in-out infinite; }
        @keyframes pulseSlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body class="min-h-screen text-slate-200">
    <div class="max-w-7xl mx-auto p-6">
        <!-- ===== HEADER ===== -->
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <div>
                <h1 class="text-4xl font-bold text-cyan-400 neon-text">Sariel's Dashboard</h1>
                <p class="text-slate-400 mt-1">Control de Ventas • Sistema Autónomo</p>
            </div>
            <div id="estado-sistema" class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-full text-sm font-medium">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> SISTEMA ACTIVO
            </div>
        </div>

        <!-- ===== MÉTRICAS ===== -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card bg-slate-900 border border-slate-700 rounded-2xl p-6">
                <div>
                    <p class="text-slate-400 text-sm"><i class="fa-solid fa-chart-line mr-2 text-cyan-400"></i>Total Ventas</p>
                    <h2 id="totalVentas" class="text-5xl font-bold text-white mt-2">0</h2>
                </div>
            </div>
            <div class="card bg-slate-900 border border-slate-700 rounded-2xl p-6">
                <div>
                    <p class="text-slate-400 text-sm"><i class="fa-solid fa-coins mr-2 text-emerald-400"></i>Monto Total</p>
                    <h2 id="totalMonto" class="text-5xl font-bold text-emerald-400 mt-2">$0</h2>
                </div>
            </div>
            <div class="card bg-slate-900 border border-slate-700 rounded-2xl p-6">
                <div>
                    <p class="text-slate-400 text-sm"><i class="fa-solid fa-calculator mr-2 text-amber-400"></i>Promedio por Venta</p>
                    <h2 id="promedioVenta" class="text-5xl font-bold text-amber-400 mt-2">$0</h2>
                </div>
            </div>
        </div>

        <!-- ===== TABLA DE VENTAS ===== -->
        <div class="card bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-700 flex justify-between items-center flex-wrap gap-3">
                <h3 class="text-xl font-semibold"><i class="fa-solid fa-clock mr-2"></i> Historial de Ventas</h3>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="generarDatosEjemplo()" class="bg-slate-700 hover:bg-slate-600 transition-colors px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-database"></i> Datos Ejemplo
                    </button>
                    <button onclick="exportarDatos()" class="bg-slate-700 hover:bg-slate-600 transition-colors px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-file-export"></i> Exportar
                    </button>
                    <button onclick="abrirModalVenta()" class="bg-cyan-600 hover:bg-cyan-500 transition-colors px-5 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Registrar Venta
                    </button>
                </div>
            </div>
            <div class="p-6 max-h-[500px] overflow-y-auto" id="ventasContainer">
                <ul id="listaVentas" class="space-y-3">
                    <li class="text-center text-slate-500 py-8">Cargando ventas...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- ===== MODAL: REGISTRAR VENTA ===== -->
    <div id="modalVenta" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4"><i class="fa-solid fa-cash-register mr-2 text-cyan-400"></i>Nueva venta</h3>
            <form id="formVenta" class="space-y-4">
                <div>
                    <label class="text-sm text-slate-400">Cliente</label>
                    <input type="text" id="inputCliente" placeholder="Nombre del cliente"
                           class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="text-sm text-slate-400">Monto ($)</label>
                    <input type="number" id="inputMonto" placeholder="0.00" min="0" step="0.01" required
                           class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="text-sm text-slate-400">Producto</label>
                    <input type="text" id="inputProducto" placeholder="Pan, Pastel, Galletas..."
                           class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                </div>
                <p id="errorVenta" class="text-rose-400 text-sm hidden">Ingresa un monto válido mayor a 0.</p>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="cerrarModalVenta()" class="px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors">Cancelar</button>
                    <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 transition-colors px-5 py-2 rounded-xl text-sm font-medium">Guardar venta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- ===== DASHBOARD PRINCIPAL (JavaScript) ===== -->
    <!-- ============================================ -->
    <script>
        // ============================================
        // CONEXIÓN CON BASE DE DATOS CENTRALIZADA
        // ============================================
        
        /**
         * Verifica si el sistema centralizado está disponible
         * Busca: window.bd (instancia de BaseDatosCentralizada)
         */
        function tieneSistemaCentralizado() {
            return typeof window.bd !== 'undefined' && window.bd !== null;
        }

        /**
         * Lee todas las ventas del sistema centralizado
         * Si no está disponible, usa localStorage como fallback
         */
        function leerVentas() {
            try {
                if (tieneSistemaCentralizado()) {
                    return window.bd.obtenerTodasLasVentas() || [];
                }
            } catch (e) {
                console.error('Error leyendo del sistema centralizado:', e);
            }
            // Fallback: localStorage local simple
            return JSON.parse(localStorage.getItem('ventas_dashboard')) || [];
        }

        /**
         * Guarda una venta en el sistema centralizado
         * Si no está disponible, usa localStorage como fallback
         */
        function guardarVenta(venta) {
            try {
                if (tieneSistemaCentralizado()) {
                    // Usar el sistema centralizado
                    window.bd.registrarVenta(venta);
                    return;
                }
            } catch (e) {
                console.error('Error guardando en sistema centralizado:', e);
            }
            // Fallback: localStorage local simple
            const ventas = JSON.parse(localStorage.getItem('ventas_dashboard')) || [];
            ventas.push({
                ...venta,
                id: Date.now(),
                fechaRegistro: venta.fecha || new Date().toISOString()
            });
            localStorage.setItem('ventas_dashboard', JSON.stringify(ventas));
        }

        // ============================================
        // ACTUALIZAR DASHBOARD
        // ============================================
        function actualizarDashboard() {
            try {
                const ventas = leerVentas();
                const totalMonto = ventas.reduce((sum, v) => sum + (Number(v.monto) || 0), 0);
                const promedio = ventas.length > 0 ? Math.round(totalMonto / ventas.length) : 0;

                // Actualizar métricas
                document.getElementById('totalVentas').innerText = ventas.length;
                document.getElementById('totalMonto').innerText = "$" + totalMonto.toLocaleString();
                document.getElementById('promedioVenta').innerText = "$" + promedio.toLocaleString();

                // Actualizar estado del sistema
                const estado = document.getElementById('estado-sistema');
                if (tieneSistemaCentralizado()) {
                    estado.innerHTML = '<div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> SISTEMA ACTIVO · CENTRALIZADO';
                } else {
                    estado.innerHTML = '<div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div> MODO LOCAL (sin base-datos-centralizada.js)';
                }

                // Actualizar lista de ventas
                const lista = document.getElementById('listaVentas');
                if (ventas.length === 0) {
                    lista.innerHTML = `
                        <li class="text-center text-slate-500 py-8">
                            <i class="fa-solid fa-inbox text-4xl block mb-3 text-slate-600"></i>
                            No hay ventas registradas
                            <br><span class="text-sm">Haz clic en "Datos Ejemplo" para generar</span>
                        </li>
                    `;
                } else {
                    lista.innerHTML = ventas.slice().reverse().map(v => `
                        <li class="bg-slate-800 p-4 rounded-xl flex justify-between items-center hover:bg-slate-750 transition-colors">
                            <div>
                                <span class="block font-medium">${escaparHTML(v.cliente || v.vendedorNombre || 'Anónimo')}</span>
                                <span class="block text-xs text-slate-500">
                                    ${v.producto ? v.producto + ' • ' : ''}
                                    ${v.fecha || v.fechaRegistro ? new Date(v.fecha || v.fechaRegistro).toLocaleString('es-ES') : ''}
                                </span>
                            </div>
                            <div class="text-right">
                                <span class="text-emerald-400 font-bold">$${Number(v.monto || 0).toLocaleString()}</span>
                                <span class="block text-xs text-slate-500">${v.metodo || 'Efectivo'}</span>
                            </div>
                        </li>
                    `).join('');
                }
            } catch (e) {
                console.error('Error al actualizar dashboard:', e);
            }
        }

        function escaparHTML(texto) {
            if (!texto) return 'Anónimo';
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        // ============================================
        // GENERAR DATOS DE EJEMPLO
        // ============================================
        function generarDatosEjemplo() {
            console.log('📊 Generando datos de ejemplo...');
            const vendedores = ['María', 'Juan', 'Carlos', 'Ana', 'Luis'];
            const productos = ['Pan Integral', 'Pan Blanco', 'Galletas', 'Pastel', 'Tortillas'];
            const metodos = ['Efectivo', 'Tarjeta', 'Transferencia'];
            
            for (let i = 0; i < 12; i++) {
                const cantidad = Math.floor(Math.random() * 5) + 1;
                const monto = cantidad * (60 + Math.floor(Math.random() * 40));
                const hora = Math.floor(Math.random() * 10) + 8;
                const fecha = new Date();
                fecha.setHours(hora, Math.floor(Math.random() * 60), 0);
                
                guardarVenta({
                    vendedorNombre: vendedores[Math.floor(Math.random() * vendedores.length)],
                    cliente: `Cliente ${String.fromCharCode(65 + Math.floor(Math.random() * 26))}`,
                    cantidad: cantidad,
                    metodo: metodos[Math.floor(Math.random() * metodos.length)],
                    monto: monto,
                    producto: productos[Math.floor(Math.random() * productos.length)],
                    fecha: fecha.toISOString()
                });
            }
            console.log('✅ Datos de ejemplo generados');
            actualizarDashboard();
            window.dispatchEvent(new CustomEvent('ventaRegistrada'));
        }

        // ============================================
        // EXPORTAR DATOS
        // ============================================
        function exportarDatos() {
            const ventas = leerVentas();
            const stats = {
                totalVentas: ventas.length,
                montoTotal: ventas.reduce((s, v) => s + (v.monto || 0), 0),
                promedio: ventas.length > 0 ? Math.round(ventas.reduce((s, v) => s + (v.monto || 0), 0) / ventas.length) : 0
            };
            
            const datos = {
                ventas: ventas,
                estadisticas: stats,
                exportadoEn: new Date().toISOString(),
                version: '1.0'
            };
            
            const blob = new Blob([JSON.stringify(datos, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `ventas-sariel-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // ============================================
        // MODAL DE REGISTRO
        // ============================================
        function abrirModalVenta() {
            document.getElementById('modalVenta').classList.remove('hidden');
            document.getElementById('inputCliente').focus();
            document.getElementById('errorVenta').classList.add('hidden');
        }

        function cerrarModalVenta() {
            document.getElementById('modalVenta').classList.add('hidden');
            document.getElementById('formVenta').reset();
            document.getElementById('errorVenta').classList.add('hidden');
        }

        document.getElementById('formVenta').addEventListener('submit', function (e) {
            e.preventDefault();
            const cliente = document.getElementById('inputCliente').value.trim();
            const monto = parseFloat(document.getElementById('inputMonto').value);
            const producto = document.getElementById('inputProducto').value.trim() || 'Pan';

            if (!monto || monto <= 0) {
                document.getElementById('errorVenta').classList.remove('hidden');
                return;
            }

            guardarVenta({
                vendedorNombre: 'Sistema',
                cliente: cliente || 'Anónimo',
                monto: monto,
                producto: producto,
                metodo: 'Efectivo',
                cantidad: 1,
                fecha: new Date().toISOString()
            });

            cerrarModalVenta();
            actualizarDashboard();
            window.dispatchEvent(new CustomEvent('ventaRegistrada'));
        });

        // Cerrar modal si se hace click fuera
        document.getElementById('modalVenta').addEventListener('click', function (e) {
            if (e.target === this) cerrarModalVenta();
        });

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        function iniciarDashboard() {
            console.log('🚀 Iniciando Dashboard Sariel\'s');
            console.log('📦 Sistema centralizado:', tieneSistemaCentralizado() ? '✅ ACTIVO' : '❌ NO DISPONIBLE');
            
            // Generar datos de ejemplo si no hay ventas
            const ventas = leerVentas();
            if (ventas.length === 0) {
                console.log('📊 No hay ventas, generando datos de ejemplo...');
                generarDatosEjemplo();
            } else {
                actualizarDashboard();
            }

            // Actualizar cada 3 segundos
            setInterval(actualizarDashboard, 3000);
        }

        // ===== EVENTOS =====
        window.addEventListener('storage', actualizarDashboard);
        window.addEventListener('ventaRegistrada', actualizarDashboard);
        window.addEventListener('sincronizacionCompleta', actualizarDashboard);
        
        // ===== EXPONER FUNCIONES GLOBALES =====
        window.generarDatosEjemplo = generarDatosEjemplo;
        window.exportarDatos = exportarDatos;
        window.abrirModalVenta = abrirModalVenta;
        window.cerrarModalVenta = cerrarModalVenta;
        window.actualizarDashboard = actualizarDashboard;

        // ===== INICIAR =====
        document.addEventListener('DOMContentLoaded', iniciarDashboard);

        console.log('✅ Dashboard preparado');
        console.log('📊 Funciones disponibles: generarDatosEjemplo(), exportarDatos(), abrirModalVenta()');
    </script>
</body>
    </html>
