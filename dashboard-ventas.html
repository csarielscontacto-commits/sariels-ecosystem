<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sariel's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="base-datos-centralizada.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); font-family: 'Segoe UI', sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .neon-text { text-shadow: 0 0 10px rgb(34 211 238); }
        .modal-overlay { background: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="min-h-screen text-slate-200">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-cyan-400 neon-text">Sariel's Dashboard</h1>
                <p class="text-slate-400 mt-1">Control de Ventas • Sistema Autónomo</p>
            </div>
            <div id="estado-sistema" class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-full text-sm font-medium">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> SISTEMA ACTIVO
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card bg-slate-900 border border-slate-700 rounded-2xl p-6">
                <div><p class="text-slate-400 text-sm">Total Ventas</p><h2 id="totalVentas" class="text-5xl font-bold text-white mt-2">0</h2></div>
            </div>
            <div class="card bg-slate-900 border border-slate-700 rounded-2xl p-6">
                <div><p class="text-slate-400 text-sm">Monto Total</p><h2 id="totalMonto" class="text-5xl font-bold text-emerald-400 mt-2">$0</h2></div>
            </div>
            <div class="card bg-slate-900 border border-slate-700 rounded-2xl p-6">
                <div><p class="text-slate-400 text-sm">Promedio por Venta</p><h2 id="promedioVenta" class="text-5xl font-bold text-amber-400 mt-2">$0</h2></div>
            </div>
        </div>

        <div class="card bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-700 flex justify-between items-center">
                <h3 class="text-xl font-semibold"><i class="fa-solid fa-clock"></i> Historial de Ventas</h3>
                <button onclick="abrirModalVenta()" class="bg-cyan-600 hover:bg-cyan-500 transition-colors px-5 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Registrar Venta
                </button>
            </div>
            <div class="p-6 max-h-[500px] overflow-y-auto" id="ventasContainer">
                <ul id="listaVentas" class="space-y-3"></ul>
            </div>
        </div>
    </div>

    <!-- Modal: registrar venta real -->
    <div id="modalVenta" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">Nueva venta</h3>
            <form id="formVenta" class="space-y-4">
                <div>
                    <label class="text-sm text-slate-400">Cliente</label>
                    <input type="text" id="inputCliente" placeholder="Nombre del cliente"
                           class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="text-sm text-slate-400">Monto ($)</label>
                    <input type="number" id="inputMonto" placeholder="0.00" min="0" step="0.01" required
                           class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500">
                </div>
                <p id="errorVenta" class="text-rose-400 text-sm hidden">Ingresa un monto válido mayor a 0.</p>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="cerrarModalVenta()" class="px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200">Cancelar</button>
                    <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 px-5 py-2 rounded-xl text-sm font-medium">Guardar venta</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ----- Conexión con el sistema centralizado (base-datos-centralizada.js) -----
        // Si el sistema centralizado está disponible, lo usamos como fuente de datos.
        // Si no (por ejemplo, abriendo este archivo suelto), caemos de vuelta a localStorage simple
        // para que el dashboard nunca se rompa.
        function tieneSistemaCentralizado() {
            return typeof window.obtenerVentasCentralizadas === 'function'
                || typeof window.BaseDatosCentralizada !== 'undefined';
        }

        function leerVentas() {
            try {
                if (typeof window.obtenerVentasCentralizadas === 'function') {
                    return window.obtenerVentasCentralizadas() || [];
                }
                if (typeof window.BaseDatosCentralizada !== 'undefined' && window.BaseDatosCentralizada.obtenerVentas) {
                    return window.BaseDatosCentralizada.obtenerVentas() || [];
                }
            } catch (e) {
                console.error('Error leyendo ventas del sistema centralizado:', e);
            }
            // Fallback: localStorage local simple
            return JSON.parse(localStorage.getItem('ventas')) || [];
        }

        function guardarVenta(venta) {
            try {
                if (typeof window.registrarVentaCentralizada === 'function') {
                    window.registrarVentaCentralizada(venta);
                    return;
                }
                if (typeof window.BaseDatosCentralizada !== 'undefined' && window.BaseDatosCentralizada.registrarVenta) {
                    window.BaseDatosCentralizada.registrarVenta(venta);
                    return;
                }
            } catch (e) {
                console.error('Error guardando en sistema centralizado, usando fallback local:', e);
            }
            // Fallback: localStorage local simple
            const ventas = JSON.parse(localStorage.getItem('ventas')) || [];
            ventas.push(venta);
            localStorage.setItem('ventas', JSON.stringify(ventas));
        }

        function actualizarDashboard() {
            try {
                const ventas = leerVentas();
                const totalMonto = ventas.reduce((sum, v) => sum + (Number(v.monto) || 0), 0);
                const promedio = ventas.length > 0 ? Math.round(totalMonto / ventas.length) : 0;

                document.getElementById('totalVentas').innerText = ventas.length;
                document.getElementById('totalMonto').innerText = "$" + totalMonto.toLocaleString();
                document.getElementById('promedioVenta').innerText = "$" + promedio.toLocaleString();

                const estado = document.getElementById('estado-sistema');
                if (tieneSistemaCentralizado()) {
                    estado.innerHTML = '<div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> SISTEMA ACTIVO · CENTRALIZADO';
                } else {
                    estado.innerHTML = '<div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div> MODO LOCAL (sin base-datos-centralizada.js)';
                }

                document.getElementById('listaVentas').innerHTML = ventas.slice().reverse().map(v => `
                    <li class="bg-slate-800 p-4 rounded-xl flex justify-between items-center">
                        <div>
                            <span class="block">${escaparHTML(v.cliente || 'Anónimo')}</span>
                            <span class="block text-xs text-slate-500">${v.fecha ? new Date(v.fecha).toLocaleString('es-ES') : ''}</span>
                        </div>
                        <span class="text-emerald-400 font-bold">$${Number(v.monto || 0).toLocaleString()}</span>
                    </li>`).join('');
            } catch (e) {
                console.error('Error al actualizar dashboard:', e);
            }
        }

        function escaparHTML(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        // ----- Modal de registro real de venta -----
        function abrirModalVenta() {
            document.getElementById('modalVenta').classList.remove('hidden');
            document.getElementById('inputCliente').focus();
        }

        function cerrarModalVenta() {
            document.getElementById('modalVenta').classList.add('hidden');
            document.getElementById('formVenta').reset();
            document.getElementById('errorVenta').classList.add('hidden');
        }

        document.getElementById('formVenta').addEventListener('submit', function (e) {
            e.preventDefault();
            const cliente = document.getElementById('inputCliente').value.trim();
            const monto = parseFloat(document.getElementById('inputMonto').value);

            if (!monto || monto <= 0) {
                document.getElementById('errorVenta').classList.remove('hidden');
                return;
            }

            guardarVenta({
                cliente: cliente || 'Anónimo',
                monto: monto,
                fecha: new Date().toISOString()
            });

            cerrarModalVenta();
            actualizarDashboard();
            window.dispatchEvent(new CustomEvent('ventaRegistrada'));
        });

        // Cerrar modal si se hace click fuera de la tarjeta
        document.getElementById('modalVenta').addEventListener('click', function (e) {
            if (e.target === this) cerrarModalVenta();
        });

        // ----- Inicialización y sincronización -----
        window.addEventListener('storage', actualizarDashboard);
        window.addEventListener('ventaRegistrada', actualizarDashboard);
        window.addEventListener('sincronizacionCompleta', actualizarDashboard);
        document.addEventListener('DOMContentLoaded', () => {
            actualizarDashboard();
            setInterval(actualizarDashboard, 2000);
        });
    </script>
</body>
</html>
