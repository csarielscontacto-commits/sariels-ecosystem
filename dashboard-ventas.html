<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Sariel's</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #panel-blackrock { background: #000; color: #0f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="panel-blackrock">
        <h3>Estado: <span id="estado-sistema">Iniciando...</span></h3>
    </div>
    
    <div id="estadisticas" class="card">
        <h3>Total Ventas: <span id="totalVentas">0</span></h3>
        <p>Monto Total: <span id="totalMonto">$0</span></p>
    </div>

    <div id="ventasContainer" class="card">
        <h3>Historial</h3>
        <ul id="listaVentas"></ul>
    </div>

    <script>
        function actualizarDashboard() {
            try {
                // 1. Obtener datos
                const ventas = JSON.parse(localStorage.getItem('ventas')) || [];
                const totalMonto = ventas.reduce((sum, v) => sum + (v.monto || 0), 0);
                
                // 2. Pintar estadísticas
                document.getElementById('totalVentas').innerText = ventas.length;
                document.getElementById('totalMonto').innerText = "$" + totalMonto.toLocaleString();
                document.getElementById('estado-sistema').innerText = "Sistema Activo: Autónomo";
                
                // 3. Pintar lista de ventas
                const lista = document.getElementById('listaVentas');
                lista.innerHTML = ventas.map(v => `<li>${v.cliente || 'Anónimo'}: $${v.monto}</li>`).join('');
                
            } catch (e) {
                console.error("Error al refrescar:", e);
            }
        }

        // Eventos de control
        window.addEventListener('storage', actualizarDashboard);
        document.addEventListener('DOMContentLoaded', actualizarDashboard);
        setInterval(actualizarDashboard, 2000);
    </script>
</body>
</html>
