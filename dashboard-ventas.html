<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Sariel's</title>
</head>
<body>
    <div id="panel-blackrock" style="background: #000; color: #0f0; padding: 20px;">
        <h3>Estado: <span id="estado-sistema">Iniciando...</span></h3>
    </div>
    <div id="ventasContainer"></div>

    <script>
        // 1. Definimos las funciones PRIMERO
        function mostrarVentas() {
            const ventas = JSON.parse(localStorage.getItem('ventas')) || [];
            const container = document.getElementById('ventasContainer');
            if (ventas.length === 0) {
                container.innerHTML = "<p>No hay ventas registradas.</p>";
                return;
            }
            container.innerHTML = "<p>Ventas cargadas: " + ventas.length + "</p>";
        }

        // 2. Función maestra
        function actualizarDashboard() {
            try {
                mostrarVentas();
                document.getElementById('estado-sistema').innerText = "Sistema Activo: Autónomo";
            } catch (e) {
                console.error("Error en actualización:", e);
            }
        }

        // 3. Eventos
        window.addEventListener('storage', actualizarDashboard);
        document.addEventListener('DOMContentLoaded', actualizarDashboard);
        setInterval(actualizarDashboard, 2000);
    </script>
</body>
</html>
