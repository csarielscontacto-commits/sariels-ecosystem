<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Ventas - Sariel's</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
        .btn { padding: 10px; cursor: pointer; }
        .section { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        #panel-blackrock { display: flex; gap: 20px; padding: 20px; background: #000; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <div id="panel-blackrock">
        <div><h3>IA Predicción</h3><p id="clima-info">Analizando...</p></div>
        <div><h3>Estado Báscula</h3><p id="peso-info">Conectando...</p></div>
        <div><h3>Decisión</h3><p id="decision-info">Autónoma</p></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="actualizarDashboard()">🔄 Forzar Actualización</button>
    </div>

    <div class="section">
        <h2>Historial de Ventas</h2>
        <div id="ventasContainer"></div>
    </div>

    <script>
        // --- 1. LÓGICA DE VENTAS (Recuperada) ---
        function mostrarVentas() {
            const ventas = JSON.parse(localStorage.getItem('ventas')) || [];
            const container = document.getElementById('ventasContainer');
            if (ventas.length === 0) { container.innerHTML = "No hay ventas."; return; }
            let html = '<ul>';
            ventas.forEach(v => { html += `<li>${v.cliente}: $${v.monto}</li>`; });
            container.innerHTML = html + '</ul>';
        }

        // --- 2. FUNCIÓN MAESTRA ---
        function actualizarDashboard() {
            console.log("Sincronizando...");
            mostrarVentas(); // Aquí reactivamos la visualización
            document.getElementById('decision-info').innerText = "Sistema Activo: Autónomo";
        }

        // --- 3. EVENTOS ---
        window.addEventListener('storage', actualizarDashboard);
        document.addEventListener('DOMContentLoaded', actualizarDashboard);
        setInterval(actualizarDashboard, 2000);
    </script>
</body>
</html>
